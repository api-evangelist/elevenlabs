naftiko: 1.0.0-alpha2
info:
  label: ElevenLabs Studio API — Audio Native
  description: 'ElevenLabs Studio API — Audio Native. 1 operations. Lead operation: Create audio native project. Self-contained
    Naftiko capability covering one Elevenlabs business surface.'
  tags:
  - Elevenlabs
  - Audio Native
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELEVENLABS_API_KEY: ELEVENLABS_API_KEY
capability:
  consumes:
  - type: http
    namespace: studio-audio-native
    baseUri: https://api.elevenlabs.io
    description: ElevenLabs Studio API — Audio Native business capability. Self-contained, no shared references.
    resources:
    - name: v1-audio-native
      path: /v1/audio-native
      operations:
      - name: createaudionativeproject
        method: POST
        description: Create audio native project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: xi-api-key
      value: '{{env.ELEVENLABS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: studio-audio-native-rest
    port: 8080
    description: REST adapter for ElevenLabs Studio API — Audio Native. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/audio-native
      name: v1-audio-native
      description: REST surface for v1-audio-native.
      operations:
      - method: POST
        name: createaudionativeproject
        description: Create audio native project
        call: studio-audio-native.createaudionativeproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: studio-audio-native-mcp
    port: 9090
    transport: http
    description: MCP adapter for ElevenLabs Studio API — Audio Native. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-audio-native-project
      description: Create audio native project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: studio-audio-native.createaudionativeproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
